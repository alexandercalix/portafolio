name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_PLANT_07FBE8910 }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "/frontend" 
          api_location: "" 
          output_location: "" 
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_ENTRA_ID_CLIENT_ID: ${{ secrets.AUTH_ENTRA_ID_CLIENT_ID }}
          AUTH_ENTRA_ID_CLIENT_SECRET: ${{ secrets.AUTH_ENTRA_ID_CLIENT_SECRET }}
          AUTH_ENTRA_ID_TENANT_ID: ${{ secrets.AUTH_ENTRA_ID_TENANT_ID }}
          AUTH_ENTRA_ID_API_SCOPE: ${{ secrets.AUTH_ENTRA_ID_API_SCOPE }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
